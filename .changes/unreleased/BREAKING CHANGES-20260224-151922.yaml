body: 'tfprotov5+tfprotov6: The `GenerateResourceConfig` RPC call is now required in `ResourceServer`. Implementations that don''t support
 provider generated configuration can return an empty response for the `GenerateResourceConfig` method, and 
 should not send the `GenerateResourceConfig` server capability.'
